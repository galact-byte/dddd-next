version: 2

project_name: dddd-next

before:
  hooks:
    - go mod download

builds:
  - id: dddd
    main: ./cmd/dddd
    binary: dddd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - windows
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -buildid=
      - -X main.appVersion={{ .Version }}

archives:
  - id: dddd
    ids:
      - dddd
    formats:
      - binary
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: galact-byte
    name: dddd-next
  prerelease: auto
